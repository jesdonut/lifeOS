<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>lifeOS</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-card">
    <div class="splash-logo">life<span style="color:var(--accent)">OS</span></div>
    <div class="splash-sub">your personal planner</div>
    <input type="file" accept=".json" id="splash-file-input" onchange="loadFile(event)" style="display:none">
    <button class="splash-btn primary" onclick="document.getElementById('splash-file-input').click()">load save file</button>
    <button class="splash-btn ghost" onclick="startFresh()">start fresh</button>
    <div class="splash-hint">
      auto-saves to your chosen file — you'll be asked where to save.<br>
      use <strong style="color:var(--text2)">load</strong> in the top bar to open your save file next time.
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;flex-direction:column;height:100vh">

  <div class="topbar">
    <span class="logo" onclick="cursor=new Date(today);setView('week')" style="cursor:pointer" title="jump to today">life<span>OS</span></span>
    <div class="vbtns">
      <button class="vbtn active" onclick="setView('week')">week</button>
      <button class="vbtn" onclick="setView('month')">month</button>
      <button class="vbtn" onclick="setView('year')">year</button>
      <button class="vbtn" onclick="setView('finance')">finance</button>
      <button class="vbtn" onclick="setView('savings')">savings</button>
    </div>
    <div class="spacer"></div>
    <div class="nav-wrap">
      <button class="nav-btn" onclick="nav(-1)">←</button>
      <span class="period" id="period-label"></span>
      <button class="nav-btn" onclick="nav(1)">→</button>
    </div>
    <div style="display:flex;align-items:center;gap:6px;margin-left:12px;padding-left:12px;border-left:1px solid var(--border)">
      <span id="saved-indicator" style="opacity:0;transition:opacity .5s;font-size:11px;color:var(--text2);font-family:var(--mono)">✓ saved</span>
      <button id="manual-save-btn" class="save-btn" onclick="saveData()" style="display:none">💾 save</button>
      <label class="load-lbl">load<input type="file" accept=".json" onchange="loadFile(event)" style="display:none"></label>
    </div>
  </div>

  <div class="app-shell">
    <div class="panel" id="main-panel"></div>
    <div class="sidebar">
      <div class="stabs">
        <button class="stab active" onclick="setSTab('notes')">notes</button>
        <button class="stab" onclick="setSTab('upcoming')">upcoming</button>
        <button class="stab" onclick="setSTab('countdowns')">countdowns</button>
      </div>
      <div class="sidebar-body" id="sidebar-body"></div>
    </div>
  </div>

</div><!-- /app -->

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script src="app.js"></script>
</body>
</html>
