<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>lifeOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="mobile.css">
</head>
<body>

<div id="app">

  <header id="m-header">
    <!-- rendered by mobile-app.js -->
  </header>

  <main id="m-content">
    <!-- rendered by mobile-app.js -->
  </main>

  <nav id="m-nav">
    <button class="m-tab active" data-tab="day" onclick="setTab('day')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="9" y1="15" x2="9" y2="15" stroke-width="2.5" stroke-linecap="round"/></svg>
      Day
    </button>
    <button class="m-tab" data-tab="week" onclick="setTab('week')">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      Week
    </button>
    <button class="m-tab" data-tab="year" onclick="setTab('year')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/></svg>
      Year
    </button>
    <button class="m-tab" data-tab="finance" onclick="setTab('finance')">
      <svg viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Finance
    </button>
    <button class="m-tab" data-tab="search" onclick="setTab('search')">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Search
    </button>
    <button class="m-tab" onclick="exportData()" style="color:var(--text3)">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Export
    </button>
  </nav>

</div>

<div class="saved-toast" id="saved-toast">✓ saved</div>

<script src="mobile.js"></script>

</body>
</html>
