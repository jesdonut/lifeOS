<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>lifeOS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>

/* ── Reset ───────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
button { font-family: inherit; cursor: pointer; }
input  { font-family: inherit; }

/* ── Tokens ──────────────────────────────────────────────────────────────── */
:root {
  --accent:   #d4607a;
  --accent2:  #e8a0b0;
  --bg:       #fdf8f8;
  --surface:  #ffffff;
  --surface2: #faf3f4;
  --border:   #e8dde0;
  --border2:  #d4c4c8;
  --text:     #3d2b2f;
  --text2:    #7a5c63;
  --text3:    #b09098;
  --radius:   12px;
  --radius-s:  8px;
  --mono: 'DM Mono', monospace;
  --sans: 'DM Sans', sans-serif;

  --nav-h:    56px;
  --header-h: 96px;
}

/* ── Layout ──────────────────────────────────────────────────────────────── */
html, body {
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  background: var(--bg);
  font-family: var(--sans);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  overflow: hidden;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
}

/* ── Header ──────────────────────────────────────────────────────────────── */
#m-header {
  flex-shrink: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 12px 16px 10px;
  min-height: var(--header-h);
}

.m-header-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2px;
}

.m-header-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  text-align: center;
  flex: 1;
}

.m-header-sub {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
  text-align: center;
  margin-bottom: 8px;
}

.m-nav-btn {
  background: none;
  border: none;
  color: var(--text3);
  font-size: 18px;
  padding: 4px 8px;
  line-height: 1;
  -webkit-tap-highlight-color: transparent;
}
.m-nav-btn:active { color: var(--accent); }

/* Day — week strip */
.day-week-strip {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
}

.day-strip-cell {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  flex: 1;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  padding: 4px 2px;
  border-radius: var(--radius-s);
}
.day-strip-cell:active { background: var(--surface2); }

.day-strip-label {
  font-size: 10px;
  color: var(--text3);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.03em;
}

.day-strip-num {
  font-size: 15px;
  font-weight: 600;
  color: var(--text2);
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
}

.day-strip-cell.today .day-strip-num {
  background: var(--accent);
  color: #fff;
}

.day-strip-cell.active:not(.today) .day-strip-num {
  background: var(--surface2);
  color: var(--text);
}

.day-strip-dot {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent2);
}

/* Week / Year / Finance header variants */
.m-header-range {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  text-align: center;
  flex: 1;
}

.m-header-detail {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
  text-align: center;
  margin-top: 2px;
}

/* ── Content area ────────────────────────────────────────────────────────── */
#m-content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 12px 16px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
}

/* ── Bottom nav ──────────────────────────────────────────────────────────── */
#m-nav {
  flex-shrink: 0;
  display: flex;
  background: var(--surface);
  border-top: 1px solid var(--border);
  padding-bottom: env(safe-area-inset-bottom);
}

.m-tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 8px 4px 6px;
  background: none;
  border: none;
  color: var(--text3);
  font-size: 10px;
  font-weight: 500;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.15s;
}

.m-tab.active { color: var(--accent); }

.m-tab svg {
  width: 20px;
  height: 20px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
}

/* ── Section headers ─────────────────────────────────────────────────────── */
.m-section {
  margin-bottom: 16px;
}

.m-section-title {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 8px;
}

/* ── Day tab ─────────────────────────────────────────────────────────────── */

/* Events */
.event-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
}
.event-row:last-of-type { border-bottom: none; }

.event-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.event-text {
  font-size: 13px;
  color: var(--text);
  flex: 1;
}

/* Spend categories */
.spend-total-bar {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 12px;
}

.spend-total-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.spend-total-amount {
  font-family: var(--mono);
  font-size: 18px;
  font-weight: 500;
  color: var(--text);
}

/* Line-item category (food / commute / transport) */
.spend-cat {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-s);
  margin-bottom: 8px;
  overflow: hidden;
}

.spend-cat-header {
  display: flex;
  align-items: center;
  padding: 10px 12px;
  gap: 8px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.spend-cat-header:active { background: var(--surface2); }

.spend-cat-names {
  flex: 1;
}

.spend-cat-jp {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}

.spend-cat-en {
  font-size: 10px;
  color: var(--text3);
  margin-top: 1px;
}

.spend-cat-total {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}

.spend-cat-chevron {
  font-size: 10px;
  color: var(--text3);
  transition: transform 0.2s;
}
.spend-cat.open .spend-cat-chevron { transform: rotate(180deg); }

.spend-cat-body {
  display: none;
  border-top: 1px solid var(--border);
  padding: 8px 12px;
}
.spend-cat.open .spend-cat-body { display: block; }

.spend-item-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 0;
  border-bottom: 1px solid var(--border);
}
.spend-item-row:last-of-type { border-bottom: none; }

.spend-item-label {
  flex: 1;
  font-size: 12px;
  color: var(--text2);
}

.spend-item-amount {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
}

.spend-item-del {
  background: none;
  border: none;
  color: var(--text3);
  font-size: 16px;
  padding: 0 2px;
  line-height: 1;
}

/* Add item form inside spend-cat-body */
.spend-add-form {
  display: flex;
  gap: 6px;
  margin-top: 8px;
  align-items: center;
}

.spend-add-amount {
  width: 80px;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 8px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text);
  background: var(--bg);
  outline: none;
}
.spend-add-amount:focus { border-color: var(--accent2); }

.spend-add-label {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 8px;
  font-family: var(--sans);
  font-size: 12px;
  color: var(--text);
  background: var(--bg);
  outline: none;
}
.spend-add-label:focus { border-color: var(--accent2); }

.spend-add-btn {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 5px 10px;
  font-size: 16px;
  line-height: 1;
  flex-shrink: 0;
}

/* Simple spend row (single input) */
.spend-simple-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-s);
  margin-bottom: 8px;
}

.spend-simple-names { flex: 1; }

.spend-simple-jp {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}

.spend-simple-en {
  font-size: 10px;
  color: var(--text3);
  margin-top: 1px;
}

.spend-simple-input {
  width: 90px;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 8px;
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text);
  background: var(--bg);
  text-align: right;
  outline: none;
}
.spend-simple-input:focus { border-color: var(--accent2); }

/* ── Week tab ────────────────────────────────────────────────────────────── */
.week-hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
}

.week-hero-left {}

.week-hero-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 2px;
}

.week-hero-total {
  font-family: var(--mono);
  font-size: 26px;
  font-weight: 500;
  color: var(--text);
}

.week-hero-delta {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  text-align: right;
}
.week-hero-delta.up   { color: #5a8a6a; }
.week-hero-delta.down { color: var(--accent); }

.week-day-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-s);
  margin-bottom: 6px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.week-day-row:active { background: var(--surface2); }

.week-day-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  min-width: 34px;
}

.week-day-num {
  font-size: 20px;
  font-weight: 600;
  color: var(--text);
  min-width: 28px;
}

.week-day-num.today {
  color: var(--accent);
}

.week-day-events {
  flex: 1;
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
  align-items: center;
}

.week-event-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
}

.week-day-quiet {
  flex: 1;
  font-size: 11px;
  color: var(--text3);
}

.week-day-spend {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  min-width: 60px;
  text-align: right;
}

.week-day-spend.zero { color: var(--text3); }

/* ── Year tab ────────────────────────────────────────────────────────────── */
.decade-strip {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 4px;
  margin-bottom: 14px;
  scrollbar-width: none;
}
.decade-strip::-webkit-scrollbar { display: none; }

.decade-card {
  flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-s);
  padding: 8px 12px;
  text-align: center;
  cursor: pointer;
  min-width: 64px;
  -webkit-tap-highlight-color: transparent;
}
.decade-card:active { background: var(--surface2); }
.decade-card.focused {
  border-color: var(--accent);
  background: #fdf0f2;
}

.decade-card-year {
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
}

.decade-card-age {
  font-size: 10px;
  color: var(--text3);
  margin-top: 1px;
}

.decade-card-dots {
  display: flex;
  gap: 3px;
  justify-content: center;
  margin-top: 4px;
  min-height: 5px;
}

.decade-event-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
}

/* Year cards */
.year-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
}

.year-card-collapsed {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 12px 14px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.year-card-collapsed:active { background: var(--surface2); }

.year-card-year {
  font-size: 18px;
  font-weight: 600;
  color: var(--text);
  min-width: 44px;
}

.year-card-age {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
}

.year-card-summary {
  flex: 1;
  font-size: 12px;
  color: var(--text2);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.year-card-meta {
  font-size: 11px;
  color: var(--text3);
  font-family: var(--mono);
  white-space: nowrap;
}

/* Expanded year card */
.year-card-expanded {
  padding: 14px;
}

.year-expanded-header {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 10px;
}

.year-expanded-year {
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
}

.year-expanded-age {
  font-size: 12px;
  color: var(--text3);
  font-family: var(--mono);
}

.year-expanded-summary {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 10px;
  line-height: 1.5;
}

/* NISA bar in year card */
.year-nisa-bar-wrap {
  margin-bottom: 12px;
}

.year-nisa-label {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text3);
  font-family: var(--mono);
  margin-bottom: 4px;
}

.year-nisa-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  display: flex;
}

.year-nisa-t { background: var(--accent2); height: 100%; }
.year-nisa-g { background: #2c4a6e;        height: 100%; }

/* Month events in expanded year card */
.year-month-row {
  display: flex;
  gap: 8px;
  margin-bottom: 6px;
  align-items: flex-start;
}

.year-month-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  font-family: var(--mono);
  min-width: 28px;
  padding-top: 3px;
  text-transform: uppercase;
}

.year-month-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}

.year-event-chip {
  font-size: 11px;
  padding: 2px 7px;
  border-radius: 10px;
  font-weight: 500;
}

/* Year footer (aim / checkpoint / note) */
.year-footer {
  border-top: 1px solid var(--border);
  margin-top: 10px;
  padding-top: 10px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.year-goal-row {
  display: flex;
  gap: 8px;
  align-items: flex-start;
}

.year-goal-icon {
  font-size: 11px;
  color: var(--text3);
  min-width: 16px;
  padding-top: 2px;
}

.year-goal-input {
  flex: 1;
  border: none;
  background: none;
  outline: none;
  font-family: var(--sans);
  font-size: 12px;
  color: var(--text);
  padding: 0;
  line-height: 1.5;
  resize: none;
}

/* ── Finance tab ─────────────────────────────────────────────────────────── */
.fin-hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}

.fin-hero-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 4px;
}

.fin-hero-balance {
  font-family: var(--mono);
  font-size: 30px;
  font-weight: 500;
  color: var(--text);
  margin-bottom: 2px;
}

.fin-hero-delta {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
}
.fin-hero-delta.up   { color: #5a8a6a; }
.fin-hero-delta.down { color: var(--accent); }

/* Distribution bar */
.fin-dist-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  margin-bottom: 12px;
}

.fin-dist-label {
  font-size: 10px;
  color: var(--text3);
  margin-bottom: 6px;
  font-family: var(--mono);
}

.fin-dist-bar {
  display: flex;
  height: 10px;
  border-radius: 5px;
  overflow: hidden;
  margin-bottom: 8px;
}

.fin-dist-bar span { height: 100%; }

.fin-dist-legend {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 12px;
}

.fin-dist-legend span {
  display: flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  color: var(--text2);
  font-family: var(--mono);
}

.fin-dist-legend i {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 2px;
}

/* Accordion sections */
.fin-section {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 8px;
  overflow: hidden;
}

.fin-section-header {
  display: flex;
  align-items: center;
  padding: 12px 14px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  gap: 8px;
}
.fin-section-header:active { background: var(--surface2); }

.fin-section-name {
  flex: 1;
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

.fin-section-auto {
  font-size: 9px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.06em;
  background: #fdf0f2;
  border: 1px solid var(--accent2);
  border-radius: 4px;
  padding: 1px 5px;
}

.fin-section-total {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}

.fin-section-chevron {
  font-size: 10px;
  color: var(--text3);
  transition: transform 0.2s;
}
.fin-section.open .fin-section-chevron { transform: rotate(180deg); }

.fin-section-body {
  display: none;
  border-top: 1px solid var(--border);
  padding: 8px 14px;
}
.fin-section.open .fin-section-body { display: block; }

.fin-field-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
}
.fin-field-row:last-child { border-bottom: none; }

.fin-field-label {
  flex: 1;
  font-size: 12px;
  color: var(--text2);
}

.fin-field-sub {
  font-size: 10px;
  color: var(--text3);
  margin-top: 1px;
}

.fin-field-input {
  width: 110px;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 5px 8px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text);
  background: var(--bg);
  text-align: right;
  outline: none;
}
.fin-field-input:focus { border-color: var(--accent2); }
.fin-field-input.filled { border-color: var(--accent2); background: #fdf8f9; }

.fin-field-auto {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--text2);
  min-width: 110px;
  text-align: right;
}

/* Net row */
.fin-net-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-top: 4px;
}

.fin-net-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}

.fin-net-amount {
  font-family: var(--mono);
  font-size: 16px;
  font-weight: 500;
}
.fin-net-amount.pos { color: #5a8a6a; }
.fin-net-amount.neg { color: var(--accent); }

/* ── Save / load bar ─────────────────────────────────────────────────────── */
#m-savebar {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 480px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: flex-end;
  gap: 8px;
  padding: 8px 16px;
  z-index: 100;
  display: none; /* shown only when File System API unavailable */
}

/* ── Utility ─────────────────────────────────────────────────────────────── */
.pill-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  color: var(--text2);
}

.add-row-btn {
  width: 100%;
  padding: 8px;
  background: none;
  border: 1px dashed var(--border2);
  border-radius: var(--radius-s);
  font-size: 12px;
  color: var(--text2);
  margin-top: 8px;
}

.saved-toast {
  position: fixed;
  bottom: calc(var(--nav-h) + 12px + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%);
  background: var(--text);
  color: #fff;
  font-size: 11px;
  font-family: var(--mono);
  padding: 5px 14px;
  border-radius: 20px;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 200;
  white-space: nowrap;
}
.saved-toast.show { opacity: 1; }

  </style>
</head>
<body>

<div id="app">

  <header id="m-header">
    <!-- rendered by mobile-app.js -->
  </header>

  <main id="m-content">
    <!-- rendered by mobile-app.js -->
  </main>

  <nav id="m-nav">
    <button class="m-tab active" data-tab="day" onclick="setTab('day')">
      <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="9" y1="15" x2="9" y2="15" stroke-width="2.5" stroke-linecap="round"/></svg>
      Day
    </button>
    <button class="m-tab" data-tab="week" onclick="setTab('week')">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      Week
    </button>
    <button class="m-tab" data-tab="year" onclick="setTab('year')">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><polyline points="12 6 12 12 16 14"/></svg>
      Year
    </button>
    <button class="m-tab" data-tab="finance" onclick="setTab('finance')">
      <svg viewBox="0 0 24 24"><line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Finance
    </button>
    <button class="m-tab" data-tab="search" onclick="setTab('search')">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Search
    </button>
    <button class="m-tab" onclick="exportData()" style="color:var(--text3)">
      <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Export
    </button>
  </nav>

</div>

<div class="saved-toast" id="saved-toast">✓ saved</div>

<script src="mobile-app.js"></script>

</body>
</html>
